<div class="flex flex-col gap-4">
  <p-table [value]="people" responsiveLayout="scroll" size="small" class="p-datatable-sm">
    <ng-template pTemplate="header">
      <tr>
        <th class="w-10 text-center"></th>
        <th class="w-32">Nome</th>

        <th class="w-16 text-center bg-gray-700 text-white">Tutti</th>

        @for (column of tableColumns; track column.label) {
          <th class="w-16 text-center" [ngClass]="getRoleColor(column.roles[0])">
            {{ column.label }}
          </th>
        }
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-person>
      <tr>
        <td class="text-center p-1">
          <button
            type="button"
            class="flex items-center justify-center w-6 h-6 mx-auto rounded-md hover:bg-rose-50 hover:text-rose-600 text-slate-400 transition-colors cursor-pointer"
            (click)="removePerson(person)"
            title="Rimuovi persona"
          >
            <i class="pi pi-trash text-xs"></i>
          </button>
        </td>
        <td class="font-semibold whitespace-nowrap">
          {{ person.name }}
        </td>

        <td class="text-center p-1 bg-gray-700">
          <p-checkbox
            [binary]="true"
            [ngModel]="hasAllRoles(person)"
            (ngModelChange)="toggleAllRoles(person)"
          >
          </p-checkbox>
        </td>

        @for (column of tableColumns; track column.label) {
          <td class="text-center p-1" [ngClass]="getRoleColor(column.roles[0])">
            <p-checkbox
              [binary]="true"
              [ngModel]="hasColumnRole(person, column.roles)"
              (ngModelChange)="toggleColumnRole(person, column.roles)"
            >
            </p-checkbox>
          </td>
        }
      </tr>
    </ng-template>
  </p-table>
</div>
