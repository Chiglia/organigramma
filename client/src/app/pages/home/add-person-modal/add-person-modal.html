<div
  class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-xs animate-fade-in"
>
  <div
    class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-2xl max-w-md w-full overflow-hidden animate-scale-in"
  >
    <!-- Header -->
    <div
      class="flex items-center justify-between p-4 border-b border-slate-100 dark:border-slate-800"
    >
      <h3 class="text-base font-bold text-slate-900 dark:text-slate-100 flex items-center gap-2">
        <i class="pi pi-user-plus text-emerald-500"></i>
        Aggiungi un nuovo capo
      </h3>
      <button
        (click)="onCancel()"
        class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 cursor-pointer p-1 rounded-md hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors"
      >
        <i class="pi pi-times text-sm"></i>
      </button>
    </div>

    <!-- Content -->
    <div class="p-5 space-y-4">
      <div class="flex flex-col gap-1.5">
        <label
          class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
        >
          Nome Completo
        </label>
        <input
          type="text"
          [(ngModel)]="newPersonName"
          class="w-full px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:outline-hidden focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500"
          placeholder="Es. Mario Rossi"
          autofocus
          (keydown.enter)="newPersonName().trim() && onSubmit()"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label
          class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
        >
          Ruoli Disponibili (Opzionale)
        </label>
        <p class="text-xs text-slate-400">
          Seleziona i ruoli predefiniti che questa persona può ricoprire:
        </p>

        <div class="grid grid-cols-2 gap-1.5 max-h-48 overflow-y-auto pr-1">
          @for (role of rolesList; track role) {
            <button
              type="button"
              (click)="toggleNewPersonRole(role)"
              [class]="
                'flex items-center gap-2 px-2 py-1 text-[11px] font-medium rounded-md border transition-all text-left cursor-pointer ' +
                (isRoleSelected(role)
                  ? 'bg-emerald-50 dark:bg-emerald-950/20 text-emerald-700 dark:text-emerald-300 border-emerald-300 dark:border-emerald-800 font-semibold'
                  : 'bg-white dark:bg-slate-800/40 text-slate-600 dark:text-slate-400 border-slate-200 dark:border-slate-800 hover:border-slate-300 dark:hover:border-slate-700')
              "
            >
              <span class="w-1.5 h-1.5 rounded-full" [class]="getRoleDotColor(role)"></span>
              <span class="truncate">{{ role }}</span>
              @if (isRoleSelected(role)) {
                <i
                  class="pi pi-check text-[8px] ml-auto text-emerald-600 dark:text-emerald-400"
                ></i>
              }
            </button>
          }
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div
      class="flex items-center justify-end gap-2 p-3 border-t border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50"
    >
      <p-button
        label="Annulla"
        [text]="true"
        severity="secondary"
        size="small"
        (onClick)="onCancel()"
      ></p-button>
      <p-button
        label="Aggiungi"
        icon="pi pi-plus"
        severity="success"
        size="small"
        [disabled]="!newPersonName().trim()"
        (onClick)="onSubmit()"
      ></p-button>
    </div>
  </div>
</div>
