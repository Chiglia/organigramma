<div class="flex flex-col gap-4">
  <p-card>
    <ng-template #title> Organigramma </ng-template>

    @if (viewMode === 'role') {
      <app-organization-role
        [assignments]="assignments"
        (assignmentRemove)="assignmentRemove.emit($event)"
      >
      </app-organization-role>
    } @else {
      <app-organization-staff
        [assignments]="assignments"
        (assignmentRemove)="assignmentRemove.emit($event)"
      >
      </app-organization-staff>
    }
  </p-card>
</div>
