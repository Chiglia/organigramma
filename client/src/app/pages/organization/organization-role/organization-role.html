<div class="flex flex-col gap-4">
  @for (role of roles; track role) {
    <div class="flex flex-col md:flex-row md:items-center gap-3">
      <div class="font-semibold w-48 rounded px-3 py-2" [ngClass]="getRoleColor(role)">
        {{ getShortRole(role) }}
      </div>

      <div
        class="flex flex-wrap gap-2 min-h-12 flex-1 p-2 rounded border border-dashed"
        pDroppable="assignment"
        (onDrop)="dropPerson(role)"
      >
        @for (assignment of getPeopleByRole(role); track assignment.person.id) {
          <div
            class="inline-flex items-center gap-1.5 pl-3 pr-1 py-1 bg-white text-slate-800 border border-slate-200 rounded-lg text-xs font-semibold shadow-xs hover:border-slate-300 transition-all cursor-move select-none"
            pDraggable="assignment"
            (onDragStart)="dragStart(assignment)"
          >
            <span>{{ assignment.person.name }}</span>
            <button
              type="button"
              class="flex items-center justify-center w-5 h-5 rounded-md hover:bg-rose-50 hover:text-rose-600 text-slate-400 transition-colors cursor-pointer"
              (click)="removeAssignment(assignment); $event.stopPropagation()"
              title="Rimuovi"
            >
              <i class="pi pi-times text-[8px] font-bold"></i>
            </button>
          </div>
        }

        @if (getPeopleByRole(role).length === 0) {
          <span class="text-gray-400"> Nessuno assegnato </span>
        }
      </div>
    </div>
  }
</div>
