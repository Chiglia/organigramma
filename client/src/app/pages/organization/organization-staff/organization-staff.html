<div class="flex flex-col gap-6">
  @for (section of staffSections; track section.label) {
    <div class="rounded-lg overflow-hidden border">
      <div class="px-4 py-2 font-bold text-lg" [ngClass]="section.color">
        {{ section.label }}
      </div>

      <div
        class="p-4 flex flex-wrap gap-2 min-h-14 border border-dashed"
        pDroppable="assignment"
        (onDrop)="dropPerson(section.staff)"
      >
        @for (assignment of getAssignmentsByStaff(section.staff); track assignment.person.id) {
          <div
            class="inline-flex items-center gap-1.5 pl-3 pr-1 py-1 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 border border-slate-200 dark:border-slate-700 rounded-lg text-xs font-semibold shadow-xs hover:border-slate-300 dark:hover:border-slate-600 transition-all cursor-move select-none"
            pDraggable="assignment"
            (onDragStart)="dragStart(assignment)"
          >
            <span>{{ assignment.person.name }}</span>
            <button
              type="button"
              class="flex items-center justify-center w-5 h-5 rounded-md hover:bg-rose-50 hover:text-rose-600 dark:hover:bg-rose-950/40 dark:hover:text-rose-400 text-slate-400 dark:text-slate-500 transition-colors cursor-pointer"
              (click)="removeAssignment(assignment); $event.stopPropagation()"
              title="Rimuovi"
            >
              <i class="pi pi-times text-[8px] font-bold"></i>
            </button>
          </div>
        }

        @if (getAssignmentsByStaff(section.staff).length === 0) {
          <span class="text-gray-400"> Nessuno assegnato </span>
        }
      </div>
    </div>
  }
</div>
