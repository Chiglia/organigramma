<div class="flex flex-col gap-6">
  @for (section of staffSections; track section.label) {
    <div class="rounded-lg overflow-hidden border">
      <div class="px-4 py-2 font-bold text-lg" [ngClass]="section.color">
        {{ section.label }}
      </div>

      <div
        class="p-4 flex flex-wrap gap-2 min-h-14 border border-dashed"
        pDroppable="assignment"
        (onDrop)="dropPerson(section.staff)"
      >
        @for (assignment of getAssignmentsByStaff(section.staff); track assignment.person.id) {
          <div class="flex items-center gap-1">
            <p-tag
              class="cursor-move"
              [value]="assignment.person.name"
              severity="info"
              pDraggable="assignment"
              (onDragStart)="dragStart(assignment)"
            >
            </p-tag>

            <p-button
              icon="pi pi-times"
              [rounded]="true"
              [text]="true"
              severity="danger"
              size="small"
              (click)="removeAssignment(assignment)"
            >
            </p-button>
          </div>
        }

        @if (getAssignmentsByStaff(section.staff).length === 0) {
          <span class="text-gray-400"> Nessuno assegnato </span>
        }
      </div>
    </div>
  }
</div>
